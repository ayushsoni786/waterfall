<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Waterfall — a pay-yourself-first money cockpit</title>
<style>
  /* ============================================================
     WATERFALL — design tokens
     A calm financial instrument panel. Money cascades through
     locked tiers; investments are protected "gold" up top, the
     card bill is the shock absorber below.
     ============================================================ */
  :root{
    --bg:        #ECEFEA;
    --surface:   #FBFCFA;
    --surface-2: #F3F5F1;
    --ink:       #102826;
    --ink-soft:  #4A5C59;
    --ink-faint: #8B9A96;
    --line:      #D7DDD6;
    --gold:      #B5791F;
    --gold-soft: #EBD9B6;
    --teal:      #2F7A6E;
    --teal-soft: #CBE3DD;
    --slate:     #5E7AA0;
    --slate-soft:#D4DEEC;
    --spend:     #7C6F86;
    --spend-soft:#E0D9E6;
    --clay:      #B1442F;
    --clay-soft: #EFD4CD;
    --radius: 14px;
    --mono: 'SF Mono','JetBrains Mono',ui-monospace,'Cascadia Code',Menlo,Consolas,monospace;
    --sans: 'Inter',system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;
    -webkit-font-smoothing:antialiased;font-size:15px;}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums;}
  .wrap{max-width:760px;margin:0 auto;padding:0 16px 96px;}

  /* ---------- masthead ---------- */
  header.mast{padding:30px 0 14px;}
  .brand{display:flex;align-items:center;gap:11px;}
  .brand .glyph{width:30px;height:30px;flex:none;border-radius:8px;
    background:linear-gradient(160deg,var(--gold) 0 40%,var(--teal) 40% 100%);position:relative;}
  .brand .glyph::after{content:"";position:absolute;left:6px;right:6px;top:8px;height:2px;background:#fff;opacity:.85;
    box-shadow:0 6px 0 rgba(255,255,255,.85),0 12px 0 rgba(255,255,255,.6);}
  .brand h1{font-size:20px;letter-spacing:-.01em;margin:0;font-weight:700;}
  .brand .tag{font-size:12.5px;color:var(--ink-faint);margin-top:1px;}

  /* ---------- tabs ---------- */
  nav.tabs{display:flex;gap:4px;margin:20px 0 22px;background:var(--surface-2);
    padding:4px;border-radius:12px;border:1px solid var(--line);overflow-x:auto;}
  nav.tabs button{flex:1 1 auto;white-space:nowrap;border:0;background:transparent;cursor:pointer;
    font-family:var(--sans);font-size:13.5px;font-weight:600;color:var(--ink-soft);
    padding:9px 12px;border-radius:9px;transition:.15s;}
  nav.tabs button[aria-selected="true"]{background:var(--surface);color:var(--ink);
    box-shadow:0 1px 2px rgba(16,40,38,.08);}
  nav.tabs button:focus-visible{outline:2px solid var(--gold);outline-offset:1px;}

  /* ---------- cards ---------- */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:20px;margin-bottom:16px;}
  .card h2{font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
    color:var(--ink-faint);margin:0 0 14px;}
  .card h2 .hint{text-transform:none;letter-spacing:0;font-weight:500;color:var(--ink-faint);}
  .eyebrow{font-size:11.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);}

  /* ---------- verdict ---------- */
  .verdict{background:linear-gradient(180deg,#13302d,#0d2422);color:#EAF1EE;border:0;}
  .verdict h2{color:rgba(234,241,238,.6);}
  .verdict .line{font-size:21px;line-height:1.35;font-weight:600;letter-spacing:-.01em;}
  .verdict .line b{color:var(--gold-soft);font-weight:700;}
  .verdict .line .ok{color:#9FD8C7;}
  .verdict .line .warn{color:#F0B3A4;}

  /* ---------- inputs ---------- */
  .billbox{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:6px;}
  .billbox label{font-size:13px;color:var(--ink-soft);font-weight:600;}
  input[type="number"],input[type="text"],input[type="date"]{
    font-family:var(--mono);font-size:15px;color:var(--ink);
    border:1px solid var(--line);background:var(--surface-2);border-radius:8px;padding:8px 10px;width:130px;}
  input[type="text"]{font-family:var(--sans);}
  input:focus{outline:2px solid var(--gold);outline-offset:0;border-color:transparent;}
  input[type="range"]{width:100%;accent-color:var(--gold);height:26px;cursor:pointer;}
  .rangewrap{margin:4px 0 2px;}
  .rangeticks{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-faint);}
  select{font-family:var(--sans);font-size:13px;border:1px solid var(--line);
    background:var(--surface-2);border-radius:8px;padding:8px;color:var(--ink);}

  /* ---------- waterfall ---------- */
  .falls{margin-top:6px;}
  .tier{margin-bottom:9px;}
  .tier .toprow{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:4px;}
  .tier .name{font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:6px;}
  .tier .name .lock{font-size:11px;color:var(--gold);font-weight:700;border:1px solid var(--gold-soft);
    background:#fff;border-radius:5px;padding:1px 5px;}
  .tier .amt{font-size:13.5px;font-weight:700;}
  .bar{height:13px;border-radius:7px;background:var(--surface-2);overflow:hidden;}
  .bar > span{display:block;height:100%;border-radius:7px;transition:width .35s cubic-bezier(.2,.7,.2,1);}
  .fill-gold{background:var(--gold);} .fill-slate{background:var(--slate);}
  .fill-spend{background:var(--spend);} .fill-teal{background:var(--teal);} .fill-clay{background:var(--clay);}
  .tier.sub{margin-left:18px;}
  .tier.sub .name{font-weight:500;color:var(--ink-soft);font-size:12.5px;}
  .deficitbox{margin-top:10px;border:1px solid var(--clay-soft);background:#FBF1EF;border-radius:10px;padding:12px 14px;}
  .deficitbox .d-title{color:var(--clay);font-weight:700;font-size:13.5px;}
  .deficitbox p{margin:5px 0 0;font-size:13px;color:var(--ink-soft);}

  /* ---------- stat rows ---------- */
  .statline{display:flex;justify-content:space-between;align-items:baseline;padding:9px 0;border-bottom:1px solid var(--line);}
  .statline:last-child{border-bottom:0;}
  .statline .k{font-size:13.5px;color:var(--ink-soft);}
  .statline .k small{display:block;color:var(--ink-faint);font-size:11.5px;}
  .statline .v{font-size:14.5px;font-weight:700;}
  .bignum{font-size:34px;font-weight:700;letter-spacing:-.02em;line-height:1;}
  .bignum.pos{color:var(--teal);} .bignum.neg{color:var(--clay);}
  .subnum{font-size:12.5px;color:var(--ink-faint);margin-top:5px;}

  /* ---------- tiles ---------- */
  .tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
  .tile{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px;cursor:pointer;
    transition:.15s;text-align:left;}
  .tile:hover{border-color:var(--gold);}
  .tile .tl{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-faint);}
  .tile .tv{font-size:18px;font-weight:700;margin-top:6px;}
  .tile .ts{font-size:11.5px;color:var(--ink-faint);margin-top:2px;}
  @media (max-width:560px){ .tiles{grid-template-columns:1fr;} }

  /* ---------- goals ---------- */
  .goal{padding:14px 0;border-bottom:1px solid var(--line);}
  .goal:last-child{border-bottom:0;}
  .goal .grow{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
  .goal .gname{font-weight:600;font-size:14.5px;}
  .goal .gmeta{font-size:12px;color:var(--ink-faint);}
  .goal .gbar{height:9px;border-radius:6px;background:var(--surface-2);margin:8px 0 6px;overflow:hidden;}
  .goal .gbar > span{display:block;height:100%;background:var(--teal);border-radius:6px;}
  .goal .gnote{font-size:12px;color:var(--ink-soft);}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;}
  .pill.near{background:var(--gold-soft);color:#6e4a10;}
  .pill.mid{background:var(--slate-soft);color:#2c3f57;}
  .pill.long{background:var(--teal-soft);color:#1c4a42;}

  /* ---------- car compare ---------- */
  table.cmp{width:100%;border-collapse:collapse;margin-top:8px;}
  table.cmp th,table.cmp td{text-align:right;padding:9px 8px;border-bottom:1px solid var(--line);font-size:13px;}
  table.cmp th:first-child,table.cmp td:first-child{text-align:left;}
  table.cmp thead th{color:var(--ink-faint);font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;}
  table.cmp td.num{font-family:var(--mono);font-variant-numeric:tabular-nums;}
  table.cmp tr.win td{background:#F1F7F3;}
  table.cmp tr.win td:first-child{font-weight:700;}
  .winbadge{font-size:10.5px;color:var(--teal);font-weight:700;}

  /* ---------- settings editor ---------- */
  .editrow{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
  .editrow input[type="text"]{flex:1;width:auto;min-width:0;}
  .editrow input[type="number"]{width:118px;flex:none;}
  .editrow .del{border:0;background:transparent;color:var(--ink-faint);cursor:pointer;
    font-size:18px;line-height:1;padding:4px 6px;border-radius:6px;}
  .editrow .del:hover{color:var(--clay);background:var(--clay-soft);}
  .addbtn{border:1px dashed var(--line);background:transparent;color:var(--ink-soft);
    border-radius:9px;padding:9px 12px;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:600;width:100%;}
  .addbtn:hover{border-color:var(--gold);color:var(--gold);}
  .grouplbl{font-size:12px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;
    color:var(--ink-faint);margin:18px 0 9px;}
  .grouplbl:first-child{margin-top:0;}

  /* ---------- buttons ---------- */
  .btn{border:0;border-radius:10px;padding:11px 16px;font-family:var(--sans);font-weight:700;
    font-size:14px;cursor:pointer;transition:.15s;}
  .btn.primary{background:var(--ink);color:#EAF1EE;}
  .btn.primary:hover{background:#0a1f1d;}
  .btn.primary:disabled{background:var(--line);color:var(--ink-faint);cursor:not-allowed;}
  .btn.ghost{background:var(--surface-2);color:var(--ink);border:1px solid var(--line);}
  .btn.ghost:hover{background:#E9ECE6;}
  .btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
  .btnrow{display:flex;gap:9px;flex-wrap:wrap;margin-top:6px;}

  .note{font-size:12px;color:var(--ink-faint);line-height:1.5;}
  .privacy{display:flex;gap:9px;align-items:flex-start;background:var(--teal-soft);
    border-radius:10px;padding:11px 13px;margin-bottom:16px;}
  .privacy .dot{width:8px;height:8px;border-radius:50%;background:var(--teal);margin-top:6px;flex:none;}
  .privacy p{margin:0;font-size:12.5px;color:#1c4a42;}
  footer{margin-top:26px;text-align:center;}
  footer .disc{font-size:11.5px;color:var(--ink-faint);max-width:520px;margin:0 auto;line-height:1.5;}

  /* ---------- onboarding wizard ---------- */
  .wizwrap{max-width:560px;margin:0 auto;padding:0 16px 60px;}
  .wizhead{padding:40px 0 10px;text-align:center;}
  .wizhead .glyph{width:44px;height:44px;border-radius:11px;margin:0 auto 14px;
    background:linear-gradient(160deg,var(--gold) 0 40%,var(--teal) 40% 100%);position:relative;}
  .wizhead .glyph::after{content:"";position:absolute;left:9px;right:9px;top:12px;height:3px;background:#fff;opacity:.85;
    box-shadow:0 9px 0 rgba(255,255,255,.85),0 18px 0 rgba(255,255,255,.6);}
  .progress{height:6px;background:var(--surface-2);border-radius:6px;overflow:hidden;margin:18px 0 22px;border:1px solid var(--line);}
  .progress > span{display:block;height:100%;background:var(--gold);transition:width .3s;}
  .stepcount{font-size:12px;color:var(--ink-faint);text-align:center;margin-bottom:6px;}
  .step h2{font-size:23px;font-weight:700;letter-spacing:-.01em;margin:0 0 6px;text-transform:none;color:var(--ink);}
  .step p.lead{font-size:14.5px;color:var(--ink-soft);margin:0 0 20px;}
  .stepnav{display:flex;justify-content:space-between;gap:10px;margin-top:26px;}
  .numpick{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px;}
  .numpick button{width:54px;height:54px;border-radius:12px;border:1px solid var(--line);background:var(--surface);
    font-size:20px;font-weight:700;cursor:pointer;color:var(--ink);}
  .numpick button[aria-pressed="true"]{border-color:var(--gold);background:var(--gold-soft);color:#6e4a10;}
  .heroprivacy{font-size:12.5px;color:var(--ink-faint);margin-top:18px;text-align:center;}

  /* ---------- checklist ritual ---------- */
  .checkrow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);}
  .checkrow:last-child{border-bottom:0;}
  .checkrow .cbox{width:24px;height:24px;flex:none;border-radius:7px;border:2px solid var(--line);
    background:var(--surface-2);cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-size:15px;color:#fff;transition:.15s;}
  .checkrow .cbox.on{background:var(--teal);border-color:var(--teal);}
  .checkrow .cmain{flex:1;min-width:0;}
  .checkrow .ctitle{font-size:14px;font-weight:600;}
  .checkrow .csub{font-size:12px;color:var(--ink-faint);}
  .checkrow .cval{font-weight:700;font-size:14px;text-align:right;white-space:nowrap;}
  .earnerline{display:flex;align-items:center;gap:8px;margin-top:6px;}
  .earnerline label{font-size:12px;color:var(--ink-soft);flex:1;}

  /* ---------- allocation ---------- */
  .alloc-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
  .alloc-row select{flex:1;min-width:0;}
  .alloc-row input[type="number"]{width:110px;flex:none;}
  .alloc-remaining{display:flex;justify-content:space-between;align-items:center;
    background:var(--surface-2);border-radius:9px;padding:9px 12px;margin-top:6px;font-size:13px;}
  .alloc-remaining b{font-size:14px;}
  .suggestbox{background:var(--gold-soft);border-radius:9px;padding:9px 12px;margin-bottom:12px;font-size:13px;color:#6e4a10;}
  .lockedbanner{display:flex;align-items:center;gap:10px;background:var(--teal-soft);border-radius:10px;
    padding:12px 14px;margin-bottom:16px;color:#1c4a42;font-weight:600;font-size:14px;}

  /* ---------- spending / statements ---------- */
  .dropzone{border:2px dashed var(--line);border-radius:12px;padding:26px;text-align:center;cursor:pointer;transition:.15s;}
  .dropzone:hover{border-color:var(--gold);background:var(--surface-2);}
  .dropzone .big{font-size:15px;font-weight:600;}
  .dropzone .sm{font-size:12.5px;color:var(--ink-faint);margin-top:4px;}
  .catbar{margin-bottom:10px;}
  .catbar .crow{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;margin-bottom:3px;}
  .catbar .cname{font-weight:600;}
  .catbar .bar{height:10px;border-radius:6px;background:var(--surface-2);overflow:hidden;}
  .catbar .bar > span{display:block;height:100%;border-radius:6px;}
  .txnrow{display:flex;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px;}
  .txnrow:last-child{border-bottom:0;}
  .txnrow .td{color:var(--ink-faint);font-size:11.5px;width:62px;flex:none;}
  .txnrow .tm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .txnrow .ta{font-family:var(--mono);font-weight:700;width:88px;text-align:right;flex:none;}
  .txnrow select{font-size:12px;padding:5px 6px;max-width:140px;}
  .srccard{display:flex;justify-content:space-between;align-items:center;background:var(--surface-2);
    border-radius:9px;padding:9px 12px;margin-bottom:8px;font-size:13px;}
  .trendwrap{display:flex;gap:10px;align-items:flex-end;height:90px;margin-top:8px;}
  .trendbar{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:4px;}
  .trendbar .tb{width:100%;background:var(--spend);border-radius:5px 5px 0 0;min-height:2px;}
  .trendbar .tl{font-size:10.5px;color:var(--ink-faint);}

  /* ---------- toast ---------- */
  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#EAF1EE;padding:11px 18px;border-radius:10px;font-size:13.5px;
    font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:50;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media (max-width:480px){
    .bignum{font-size:28px;} .verdict .line{font-size:18px;}
    .editrow input[type="number"]{width:96px;}
  }
  @media (prefers-reduced-motion:reduce){ *{transition:none!important;} }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" role="status" aria-live="polite"></div>

<script src="parser.js"></script>
<script>
"use strict";
/* ============================================================
   STORAGE — localStorage with safe in-memory fallback
   ============================================================ */
const STORAGE_KEY = "waterfall.finance.v1";
const hasStorage = (() => {
  try { const k="__wf_t"; localStorage.setItem(k,"1"); localStorage.removeItem(k); return true; }
  catch(e){ return false; }
})();
let memState = null;
function loadState(){
  if(hasStorage){ try{ const r=localStorage.getItem(STORAGE_KEY); return r?JSON.parse(r):null; }catch(e){ return null; } }
  return memState;
}
function persist(){
  if(hasStorage){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){} }
  else { memState = state; }
}

/* ============================================================
   SAMPLE DATA — illustrative dual-income couple. "Explore" loads this.
   ============================================================ */
function isoIn(months){ const d=new Date(); d.setMonth(d.getMonth()+months); return d.toISOString().slice(0,10); }
const SAMPLE = {
  people:[ {name:"You (take-home)", amount:240000}, {name:"Partner (take-home)", amount:225000} ],
  fixed:[
    {name:"Rent", amount:41000},{name:"Electricity", amount:2500},{name:"Household help", amount:7000},
    {name:"Insurance (term + health)", amount:10000},{name:"Subscriptions", amount:5000}
  ],
  locked:[
    {name:"Retirement SIP", amount:50000, kind:"equity"},
    {name:"Goal fund (car → property)", amount:90000, kind:"safe"}
  ],
  surplus:{ goalsPct:55, flexPct:45 },
  flexBuffer: 0,
  assets:[
    {name:"Emergency fund", amount:1000000, cls:"cash"},
    {name:"Stocks & mutual funds", amount:900000, cls:"equity"},
    {name:"Fixed deposits", amount:1300000, cls:"cash"},
    {name:"Digital gold", amount:850000, cls:"gold"}
  ],
  liabilities:[],
  goals:[
    {name:"Car", target:2700000, saved:0, date:isoIn(10), bucket:"safe"},
    {name:"First child fund", target:1500000, saved:0, date:isoIn(30), bucket:"safe"},
    {name:"Property down payment", target:4000000, saved:0, date:isoIn(20), bucket:"safe"},
    {name:"Retirement (long-term)", target:50000000, saved:900000, date:isoIn(330), bucket:"equity"}
  ],
  car:{ price:2700000, marginalTaxPct:30, leaseMonthly:48000, perqMonthly:3200, loanRatePct:8.0, loanYears:5, downPct:20 },
  thisMonthBill: 180000,
  history:[]
};

/* a fresh, empty plan the wizard fills in */
function blankPlan(){
  return { people:[{name:"You",amount:0}], fixed:[], locked:[], surplus:{goalsPct:50,flexPct:50},
    flexBuffer:0, assets:[], liabilities:[], goals:[], car:structuredClone(SAMPLE.car), thisMonthBill:0, history:[] };
}

/* ============================================================
   STATE & ROUTING
   ============================================================ */
let state = loadState();           // null => first run => onboarding
let route = state ? "app" : "onboarding";
let activeTab = "home";

/* onboarding draft */
let onb = null;
/* ephemeral monthly ritual state */
let ritual = { salary:false, locked:false, bills:false };
/* ephemeral allocation rows for this month */
let alloc = null;

/* ============================================================
   HELPERS
   ============================================================ */
const sum = arr => (arr||[]).reduce((a,b)=>a+(Number(b.amount)||0),0);
function inr(n){ return "₹"+Math.round(Number(n)||0).toLocaleString("en-IN"); }
function compact(n){
  n=Number(n)||0; const a=Math.abs(n);
  if(a>=1e7) return "₹"+(n/1e7).toFixed(2).replace(/\.00$/,"")+"Cr";
  if(a>=1e5) return "₹"+(n/1e5).toFixed(2).replace(/\.00$/,"")+"L";
  if(a>=1e3) return "₹"+(n/1e3).toFixed(0)+"k";
  return "₹"+Math.round(n);
}
function monthsBetween(iso){
  const t=new Date(iso), now=new Date();
  return Math.max(0, (t.getFullYear()-now.getFullYear())*12 + (t.getMonth()-now.getMonth()));
}
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function toast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove("show"),2200);
}
function currentMonthKey(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); }
function currentMonthLabel(){ return new Date().toLocaleDateString("en-IN",{month:"long",year:"numeric"}); }
function emergencyFund(){ return (state.assets.find(x=>/emergenc/i.test(x.name))||{}); }

/* core monthly engine */
function computeMonth(bill){
  const income = sum(state.people);
  const locked = sum(state.locked);
  const fixed  = sum(state.fixed);
  const ceiling = income - locked - fixed;
  const b = Number(bill)||0;
  const surplus = ceiling - b;
  return { income, locked, fixed, ceiling, bill:b, surplus, deficit: surplus<0 ? -surplus : 0 };
}

/* smart suggested allocation destination for leftover money */
function suggestDestination(){
  // 1. nearest-term goal that isn't fully funded
  const near = (state.goals||[])
    .map((g,i)=>({i,g,m:monthsBetween(g.date)}))
    .filter(o=>o.m<=36 && (Number(o.g.saved)||0) < (Number(o.g.target)||0))
    .sort((a,b)=>a.m-b.m)[0];
  if(near) return {dest:"goal:"+near.i, label:near.g.name+" (near-term, behind)"};
  // 2. emergency fund under ~6 months of fixed costs
  const ef = emergencyFund(); const fixedM = sum(state.fixed);
  if(ef.amount!=null && fixedM>0 && (ef.amount/fixedM) < 6) return {dest:"ef", label:"Emergency fund (under 6 months)"};
  // 3. otherwise the flex buffer
  return {dest:"buffer", label:"Flex buffer"};
}

/* build the dropdown options for allocation destinations */
function allocOptions(){
  const opts=[];
  const ef = emergencyFund();
  if(ef.name) opts.push({v:"ef", t:"Add to "+ef.name});
  (state.goals||[]).forEach((g,i)=>opts.push({v:"goal:"+i, t:"Add to "+g.name+" goal"}));
  (state.liabilities||[]).forEach((l,i)=>opts.push({v:"liab:"+i, t:"Pay down "+l.name}));
  opts.push({v:"buffer", t:"Keep in Flex buffer"});
  return opts;
}
function destLabel(v){ const o=allocOptions().find(o=>o.v===v); return o?o.t:v; }

   RENDER ROOT
   ============================================================ */
function render(){
  if(route==="onboarding"){ renderOnboarding(); return; }
  if(state){ state.spending = state.spending||{}; state.merchantMaster = state.merchantMaster||{}; }
  const tabs = `
    <nav class="tabs" role="tablist" id="tabs">
      <button role="tab" data-tab="home" aria-selected="${activeTab==='home'}">This month</button>
      <button role="tab" data-tab="spending" aria-selected="${activeTab==='spending'}">Spending</button>
      <button role="tab" data-tab="worth" aria-selected="${activeTab==='worth'}">Net worth</button>
      <button role="tab" data-tab="goals" aria-selected="${activeTab==='goals'}">Goals</button>
      <button role="tab" data-tab="car" aria-selected="${activeTab==='car'}">Big buy</button>
      <button role="tab" data-tab="settings" aria-selected="${activeTab==='settings'}">Settings</button>
    </nav>`;
  const view = ({home:viewHome, spending:viewSpending, worth:viewWorth, goals:viewGoals, car:viewCar, settings:viewSettings})[activeTab]();
  document.getElementById("app").innerHTML = `
    <div class="wrap">
      <header class="mast"><div class="brand"><div class="glyph" aria-hidden="true"></div>
        <div><h1>Waterfall</h1><div class="tag">Pay your future first. Let spending be the variable.</div></div></div>
      </header>
      ${tabs}
      <main id="view">${view}</main>
      <footer><p class="disc">Waterfall is a planning tool, not financial, tax, or investment advice.
        The big-buy comparison and any tax figures are illustrative — confirm specifics with a qualified adviser.</p></footer>
    </div>`;
  wireApp();
}

/* ============================================================
   ONBOARDING WIZARD
   ============================================================ */
function startOnboarding(){ onb = { step:0, draft:blankPlan(), earners:1 }; route="onboarding"; render(); }
function exploreSample(){ state = structuredClone(SAMPLE); persist(); route="app"; activeTab="home"; render(); toast("Loaded sample data"); }

const WIZ_STEPS = ["welcome","earners","bills","locked","surplus","assets","goals","done"];

function renderOnboarding(){
  if(!onb) onb = { step:0, draft:blankPlan(), earners:1 };
  const step = WIZ_STEPS[onb.step];
  const idx = onb.step, total = WIZ_STEPS.length;
  const pct = Math.round((idx/(total-1))*100);
  let body="";

  if(step==="welcome"){
    body = `
      <div class="wizhead"><div class="glyph" aria-hidden="true"></div>
        <h2 style="text-transform:none">Pay your future first.</h2>
        <p class="lead" style="text-align:center">Let spending be the only thing that changes. Set up your plan in a couple of minutes.</p>
      </div>
      <div class="btnrow" style="flex-direction:column">
        <button class="btn primary" data-act="next" style="width:100%">Set up my money</button>
        <button class="btn ghost" data-act="sample" style="width:100%">Just show me how it works</button>
      </div>
      <p class="heroprivacy">🔒 Everything stays on this device. No account, no server, nothing uploaded.</p>`;
    document.getElementById("app").innerHTML = `<div class="wizwrap">${body}</div>`;
    wireOnboarding(); return;
  }

  if(step==="earners"){
    const n = onb.earners;
    let fields="";
    for(let i=0;i<n;i++){
      const label = i===0 ? "Your monthly take-home" : (n===2 ? "Partner's monthly take-home" : "Earner "+(i+1)+" take-home");
      const val = (onb.draft.people[i] && onb.draft.people[i].amount) || "";
      fields += `<div class="editrow"><span class="k" style="flex:1">${label}</span>
        <input type="number" data-earner="${i}" value="${val}" placeholder="0"></div>`;
    }
    body = `
      <h2>How many of you are earning?</h2>
      <p class="lead">We'll add a take-home box for each.</p>
      <div class="numpick">
        ${[1,2,3].map(k=>`<button data-earners="${k}" aria-pressed="${n===k}">${k}</button>`).join("")}
      </div>
      <div style="margin-top:14px">${fields}</div>`;
  }

  else if(step==="bills"){
    body = `
      <h2>What do you pay every month, no matter what?</h2>
      <p class="lead">Rent, utilities, insurance, subscriptions. Keep these <b>off your credit card</b> — they're separate from card spend.</p>
      ${listEditorWiz("fixed","Fixed bills")}`;
  }
  else if(step==="locked"){
    body = `
      <h2>What goes to your future, first?</h2>
      <p class="lead">Your SIPs, retirement, goal funds. These come out <b>before</b> you spend a rupee, and never get touched.</p>
      ${listEditorWiz("locked","Locked investments",{kind:true})}`;
  }
  else if(step==="surplus"){
    const gp = onb.draft.surplus.goalsPct;
    body = `
      <h2>When money's left over, how should it split?</h2>
      <p class="lead">In good months, the leftover splits between building goals faster and a guilt-free Flex buffer. (You can always override this each month.)</p>
      <div class="rangewrap"><input type="range" id="onbGoals" min="0" max="100" step="5" value="${gp}"></div>
      <div class="rangeticks"><span>All to Flex buffer</span><span>All to Goals</span></div>
      <div class="statline" style="margin-top:12px"><span class="k">→ Goals</span><span class="v" id="gpv">${gp}%</span></div>
      <div class="statline"><span class="k">→ Flex buffer</span><span class="v" id="fpv">${100-gp}%</span></div>`;
  }
  else if(step==="assets"){
    body = `
      <h2>What do you own and owe?</h2>
      <p class="lead">Savings, investments, gold, and any loans. Powers your net worth. <b>Skip if you'd rather add it later.</b></p>
      ${listEditorWiz("assets","Assets",{cls:true})}
      <div style="height:8px"></div>
      ${listEditorWiz("liabilities","Loans / liabilities")}`;
  }
  else if(step==="goals"){
    body = `
      <h2>What are you saving toward?</h2>
      <p class="lead">A car, a house, a child fund. Name, target, by-when. <b>Skippable.</b></p>
      ${goalEditorWiz()}`;
  }
  else if(step==="done"){
    body = `
      <div class="wizhead"><div class="glyph" aria-hidden="true"></div>
      <h2 style="text-transform:none">You're all set.</h2>
      <p class="lead" style="text-align:center">Your plan is ready. Each month, you'll confirm your numbers, enter your card spend, and decide where the leftover goes.</p></div>`;
  }

  const nav = step==="welcome" ? "" : `
    <div class="stepnav">
      <button class="btn ghost" data-act="back">Back</button>
      <button class="btn primary" data-act="${step==='done'?'finish':'next'}">${step==='done'?'Open my dashboard':(['assets','goals'].includes(step)?'Continue / Skip':'Continue')}</button>
    </div>`;

  document.getElementById("app").innerHTML = `
    <div class="wizwrap">
      <div class="stepcount">Step ${idx} of ${total-1}</div>
      <div class="progress"><span style="width:${pct}%"></span></div>
      <div class="step">${body}</div>
      ${nav}
    </div>`;
  wireOnboarding();
}

/* simplified list editor used inside the wizard (writes to onb.draft) */
function listEditorWiz(key,title,opts={}){
  const rows=(onb.draft[key]||[]).map((it,i)=>{
    const kindSel = opts.kind ? `<select data-wlist="${key}" data-i="${i}" data-f="kind">
      <option value="safe"${it.kind==="safe"?" selected":""}>safe</option>
      <option value="equity"${it.kind==="equity"?" selected":""}>equity</option></select>`:"";
    const clsSel = opts.cls ? `<select data-wlist="${key}" data-i="${i}" data-f="cls">
      ${["cash","equity","gold","property","other"].map(o=>`<option value="${o}"${it.cls===o?" selected":""}>${o}</option>`).join("")}</select>`:"";
    return `<div class="editrow">
      <input type="text" data-wlist="${key}" data-i="${i}" data-f="name" value="${esc(it.name)}" placeholder="Name">
      <input type="number" data-wlist="${key}" data-i="${i}" data-f="amount" value="${it.amount}" placeholder="0">
      ${kindSel}${clsSel}
      <button class="del" data-wdel="${key}" data-i="${i}" title="Remove">×</button></div>`;
  }).join("");
  return `<div class="grouplbl">${title}</div>${rows}<button class="addbtn" data-wadd="${key}">+ Add row</button>`;
}
function goalEditorWiz(){
  const rows=(onb.draft.goals||[]).map((g,i)=>`
    <div class="editrow" style="flex-wrap:wrap">
      <input type="text" data-wlist="goals" data-i="${i}" data-f="name" value="${esc(g.name)}" placeholder="Goal">
      <input type="number" data-wlist="goals" data-i="${i}" data-f="target" value="${g.target}" placeholder="Target">
      <input type="date" data-wlist="goals" data-i="${i}" data-f="date" value="${g.date}">
      <select data-wlist="goals" data-i="${i}" data-f="bucket">
        <option value="safe"${g.bucket==="safe"?" selected":""}>safe</option>
        <option value="equity"${g.bucket==="equity"?" selected":""}>equity</option></select>
      <button class="del" data-wdel="goals" data-i="${i}" title="Remove">×</button></div>`).join("");
  return `${rows}<button class="addbtn" data-wadd="goals">+ Add goal</button>`;
}

function wireOnboarding(){
  const root=document.getElementById("app");
  root.querySelectorAll("[data-act]").forEach(b=>b.onclick=()=>{
    const a=b.dataset.act;
    if(a==="sample"){ exploreSample(); return; }
    if(a==="next"){ onb.step++; render(); return; }
    if(a==="back"){ onb.step--; render(); return; }
    if(a==="finish"){ finishOnboarding(); return; }
  });
  // earners count
  root.querySelectorAll("[data-earners]").forEach(b=>b.onclick=()=>{
    onb.earners=Number(b.dataset.earners);
    // resize people array
    const p=onb.draft.people;
    while(p.length<onb.earners) p.push({name:"Earner "+(p.length+1),amount:0});
    p.length=onb.earners;
    renderOnboarding();
  });
  root.querySelectorAll("[data-earner]").forEach(inp=>inp.oninput=()=>{
    const i=Number(inp.dataset.earner);
    if(!onb.draft.people[i]) onb.draft.people[i]={name:i===0?"You":"Earner "+(i+1),amount:0};
    onb.draft.people[i].amount=Number(inp.value)||0;
  });
  // surplus slider
  const gs=root.querySelector("#onbGoals");
  if(gs) gs.oninput=()=>{ const v=Number(gs.value)||0; onb.draft.surplus.goalsPct=v; onb.draft.surplus.flexPct=100-v;
    root.querySelector("#gpv").textContent=v+"%"; root.querySelector("#fpv").textContent=(100-v)+"%"; };
  // list editors
  root.querySelectorAll("[data-wlist]").forEach(inp=>inp.onchange=()=>{
    const {wlist,i,f}=inp.dataset;
    const val=(f==="amount"||f==="target"||f==="saved")?(Number(inp.value)||0):inp.value;
    onb.draft[wlist][Number(i)][f]=val;
    if(inp.tagName==="SELECT") renderOnboarding();
  });
  root.querySelectorAll("[data-wadd]").forEach(btn=>btn.onclick=()=>{
    const key=btn.dataset.wadd;
    const templ={ fixed:{name:"",amount:0}, locked:{name:"",amount:0,kind:"equity"},
      assets:{name:"",amount:0,cls:"cash"}, liabilities:{name:"",amount:0},
      goals:{name:"",target:100000,saved:0,date:isoIn(24),bucket:"safe"} }[key];
    onb.draft[key].push(structuredClone(templ)); renderOnboarding();
  });
  root.querySelectorAll("[data-wdel]").forEach(btn=>btn.onclick=()=>{
    onb.draft[btn.dataset.wdel].splice(Number(btn.dataset.i),1); renderOnboarding();
  });
}
function finishOnboarding(){
  state = onb.draft;
  // drop empty rows the user added but never filled
  ["fixed","locked","assets","liabilities","goals"].forEach(k=>{
    state[k]=(state[k]||[]).filter(x=>String(x.name||"").trim()!=="");
  });
  if(!state.people.length) state.people=[{name:"You",amount:0}];
  persist(); onb=null; route="app"; activeTab="home"; render(); toast("Your plan is ready");
}

/* ============================================================
   HOME — the monthly ritual + waterfall
   ============================================================ */
function alreadyRecorded(){ return (state.history||[]).some(h=>h.key===currentMonthKey()); }

function ensureAlloc(){
  const m=computeMonth(state.thisMonthBill);
  if(m.surplus<=0){ alloc=null; return; }
  if(!alloc){ const s=suggestDestination(); alloc=[{dest:s.dest, amount:Math.round(m.surplus)}]; }
}

function viewHome(){
  const m = computeMonth(state.thisMonthBill);
  const w = x => (Math.max(0,x)/Math.max(1,m.income)*100).toFixed(1)+"%";
  const locked = alreadyRecorded();

  // verdict
  let verdict;
  if(m.surplus>=0){
    verdict = `On a <b>${compact(m.bill)}</b> card month, <span class="ok">${compact(m.locked)} still flows to your future</span> — locked, untouched. You have <b>${compact(m.surplus)}</b> left over.`;
  } else {
    verdict = `This is a <span class="warn">${compact(m.bill)} card month</span> — over your ${compact(m.ceiling)} ceiling. Your <span class="ok">${compact(m.locked)} of investments stays untouched</span>; the <b>${compact(m.deficit)}</b> gap is drawn from your Flex buffer.`;
  }

  // tiles
  const nw = sum(state.assets)-sum(state.liabilities);
  const goalsOnTrack = goalsOnTrackCount();
  const tiles = `
    <div class="tiles">
      <button class="tile" data-go="worth"><div class="tl">Net worth</div><div class="tv mono">${compact(nw)}</div><div class="ts">tap for detail</div></button>
      <button class="tile" data-go="goals"><div class="tl">Goals on track</div><div class="tv">${goalsOnTrack.ok}/${goalsOnTrack.total}</div><div class="ts">${goalsOnTrack.total-goalsOnTrack.ok} need attention</div></button>
      <button class="tile" data-go="home"><div class="tl">Flex buffer</div><div class="tv mono">${compact(state.flexBuffer)}</div><div class="ts">your shock absorber</div></button>
    </div>`;

  // tiers
  let tiers = `
    <div class="tier"><div class="toprow"><span class="name">Investments <span class="lock">LOCKED</span></span><span class="amt mono">${inr(m.locked)}</span></div>
      <div class="bar"><span class="fill-gold" style="width:${w(m.locked)}"></span></div></div>
    <div class="tier"><div class="toprow"><span class="name">Fixed bills</span><span class="amt mono">${inr(m.fixed)}</span></div>
      <div class="bar"><span class="fill-slate" style="width:${w(m.fixed)}"></span></div></div>
    <div class="tier"><div class="toprow"><span class="name">Card spend <span class="note" style="font-weight:500">(the variable)</span></span><span class="amt mono">${inr(m.bill)}</span></div>
      <div class="bar"><span class="fill-spend" style="width:${w(m.bill)}"></span></div></div>`;
  if(m.surplus>=0){
    tiers += `<div class="tier" style="margin-top:13px"><div class="toprow"><span class="name">Leftover this month</span><span class="amt mono">${inr(m.surplus)}</span></div>
      <div class="bar"><span class="fill-teal" style="width:${w(m.surplus)}"></span></div></div>`;
  } else {
    tiers += `<div class="deficitbox"><div class="d-title">Buffer drawdown — ${inr(m.deficit)}</div>
      <p>You spent past the ceiling. This comes from your Flex buffer — <b>not</b> investments, <b>not</b> emergency fund. Current buffer: <span class="mono">${inr(state.flexBuffer)}</span>.</p></div>`;
  }

  const waterfallCard = `
    <section class="card"><h2>The waterfall <span class="hint">— how this month cascades</span></h2>
    <div class="falls">${tiers}</div></section>`;

  if(locked){
    return `
      <div class="lockedbanner">✓ ${currentMonthLabel()} is locked in. Here's how it landed.</div>
      <section class="card verdict"><h2>The verdict</h2><div class="line">${verdict}</div></section>
      ${tiles}
      ${waterfallCard}
      <section class="card"><h2>Flex buffer</h2>
        <div class="statline"><span class="k">Current buffer</span><span class="v mono">${inr(state.flexBuffer)}</span></div>
        ${recentMonths()}</section>
      <div class="btnrow"><button class="btn ghost" id="reopenBtn">Re-open ${currentMonthLabel()}</button></div>`;
  }

  // the checklist
  const earnerLines = state.people.map((p,i)=>`<div class="earnerline">
      <label>${esc(p.name)}</label>
      <input type="number" data-ritual-earner="${i}" value="${p.amount}"></div>`).join("");

  return `
    <section class="card"><h2>Your ${currentMonthLabel()} check-in <span class="hint">— tick or tweak, then lock it in</span></h2>
      <div class="checkrow">
        <div class="cbox ${ritual.salary?'on':''}" data-tick="salary">${ritual.salary?'✓':''}</div>
        <div class="cmain"><div class="ctitle">Salary landed</div>
          <div class="csub">${state.people.length} earner${state.people.length>1?'s':''} · ${inr(sum(state.people))} total</div>
          ${earnerLines}</div>
      </div>
      <div class="checkrow">
        <div class="cbox ${ritual.locked?'on':''}" data-tick="locked">${ritual.locked?'✓':''}</div>
        <div class="cmain"><div class="ctitle">Locked investments went out</div>
          <div class="csub">${(state.locked||[]).map(l=>esc(l.name)).join(', ')||'none set'}</div></div>
        <div class="cval mono">${inr(sum(state.locked))}</div>
      </div>
      <div class="checkrow">
        <div class="cbox ${ritual.bills?'on':''}" data-tick="bills">${ritual.bills?'✓':''}</div>
        <div class="cmain"><div class="ctitle">Fixed bills paid</div>
          <div class="csub">${(state.fixed||[]).length} bills</div></div>
        <div class="cval mono">${inr(sum(state.fixed))}</div>
      </div>
      <div class="checkrow">
        <div class="cbox" style="visibility:hidden"></div>
        <div class="cmain"><div class="ctitle">This month's card spend <span class="note" style="font-weight:500">— the only number that changes</span></div>
          <div class="billbox" style="margin-top:6px">
            <input id="billn" type="number" step="1000" min="0" value="${Math.round(m.bill)}">
            <span class="note">Ceiling before buffer: <b class="mono">${inr(m.ceiling)}</b></span>
          </div>
          ${state.spending&&state.spending[currentMonthKey()]&&state.spending[currentMonthKey()].total
            ? `<p class="note" style="margin-top:4px">📄 From your statements: <b class="mono">${inr(state.spending[currentMonthKey()].total)}</b> · <a href="#" data-go="spending" style="color:var(--gold)">review &amp; categorise</a></p>`
            : `<p class="note" style="margin-top:4px"><a href="#" data-go="spending" style="color:var(--gold)">📄 Upload your card statements</a> to auto-fill &amp; categorise — or just type the total.</p>`}
        </div>
      </div>
    </section>

    <section class="card verdict"><h2>The verdict</h2><div class="line">${verdict}</div></section>
    ${waterfallCard}
    ${m.surplus>=0 ? allocCard(m) : ""}

    <div class="btnrow">
      <button class="btn primary" id="lockBtn">Lock in ${currentMonthLabel()}</button>
      <span class="note" style="align-self:center">Records the month and applies your allocation.</span>
    </div>`;
}

function allocCard(m){
  ensureAlloc();
  const s=suggestDestination();
  const opts=allocOptions();
  const allocated = alloc.reduce((a,r)=>a+(Number(r.amount)||0),0);
  const remaining = Math.round(m.surplus - allocated);
  const rows = alloc.map((r,i)=>`
    <div class="alloc-row">
      <select data-alloc-dest="${i}">
        ${opts.map(o=>`<option value="${o.v}"${o.v===r.dest?" selected":""}>${esc(o.t)}</option>`).join("")}
      </select>
      <input type="number" data-alloc-amt="${i}" value="${Math.round(r.amount)}">
      <button class="del" data-alloc-del="${i}" title="Remove">×</button>
    </div>`).join("");
  return `
    <section class="card"><h2>Where should the ₹${Math.round(m.surplus).toLocaleString("en-IN")} go? <span class="hint">— split it any way you like</span></h2>
      <div class="suggestbox">💡 Suggested: send it to <b>${esc(s.label)}</b>. Change it below however you want.</div>
      ${rows}
      <button class="addbtn" id="allocAdd">+ Add another destination</button>
      <div class="alloc-remaining">
        <span>${remaining===0?'Fully allocated ✅':(remaining>0?'Remaining (rolls into Flex buffer):':'Over-allocated — trim a row:')}</span>
        <b class="mono" style="color:${remaining<0?'var(--clay)':'var(--ink)'}">${inr(Math.abs(remaining))}</b>
      </div>
    </section>`;
}

function goalsOnTrackCount(){
  const goals=state.goals||[]; let ok=0;
  const lockedM=sum(state.locked);
  goals.forEach(g=>{
    const months=monthsBetween(g.date); const rem=Math.max(0,(g.target||0)-(g.saved||0));
    const need= months>0?rem/months:rem;
    if(need<=lockedM) ok++; // crude: comfortably fundable from current locked saving
  });
  return {ok, total:goals.length};
}

function recentMonths(){
  if(!state.history.length) return `<p class="note" style="margin-top:10px">No months recorded yet.</p>`;
  const rows = state.history.slice(-6).reverse().map(h=>{
    const tag = h.surplus>=0 ? `<span class="mono" style="color:var(--teal)">+${inr(h.surplus)}</span>`
                             : `<span class="mono" style="color:var(--clay)">−${inr(h.deficit)}</span>`;
    return `<div class="statline"><span class="k">${esc(h.label)}<small>bill ${inr(h.bill)}</small></span><span class="v">${tag}</span></div>`;
  }).join("");
  return `<div style="margin-top:6px">${rows}</div>`;
}

function lockInMonth(){
  const m=computeMonth(state.thisMonthBill);
  if(m.surplus>=0){
    ensureAlloc();
    let allocated=0;
    alloc.forEach(r=>{
      const amt=Number(r.amount)||0; if(amt<=0) return; allocated+=amt;
      applyAllocation(r.dest, amt);
    });
    const leftover=Math.max(0, m.surplus-allocated);
    if(leftover>0) state.flexBuffer += leftover;     // unassigned rolls into buffer
  } else {
    state.flexBuffer = Math.max(0, state.flexBuffer - m.deficit);
  }
  state.history.push({
    key: currentMonthKey(), label: currentMonthLabel().replace(/ /,' '),
    bill:m.bill, surplus:Math.max(0,m.surplus), deficit:m.deficit
  });
  alloc=null; ritual={salary:false,locked:false,bills:false};
  persist(); render();
  toast(`${currentMonthLabel()} locked in`);
}
function applyAllocation(dest, amt){
  if(dest==="buffer"){ state.flexBuffer += amt; return; }
  if(dest==="ef"){ const ef=emergencyFund(); if(ef) ef.amount=(Number(ef.amount)||0)+amt; return; }
  if(dest.startsWith("goal:")){ const g=state.goals[Number(dest.slice(5))]; if(g) g.saved=Math.min(Number(g.target)||Infinity,(Number(g.saved)||0)+amt); return; }
  if(dest.startsWith("liab:")){ const l=state.liabilities[Number(dest.slice(5))]; if(l) l.amount=Math.max(0,(Number(l.amount)||0)-amt); return; }
}

function catColor(c){ return CAT_COLORS[c] || "#6f8a85"; }
const DEFAULT_CATS=["Food & Dining","Travel & Transport","Groceries","Shopping","Bills & Subscriptions","Health","Entertainment","Payment / Transfer","Other"];

/* lazy-load pdf.js only when a statement is uploaded (keeps core app offline) */
let _pdfjs=null;
async function loadPdfjs(){
  if(_pdfjs) return _pdfjs;
  const m=await import("https://cdn.jsdelivr.net/npm/pdfjs-dist@4.7.76/build/pdf.min.mjs");
  m.GlobalWorkerOptions.workerSrc="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.7.76/build/pdf.worker.min.mjs";
  _pdfjs=m; return m;
}
function explodeItem(it){
  // split a pdf.js text run into word-tokens with estimated x, to mirror pdfplumber granularity
  const s=it.str; const out=[]; const x0=it.transform[4], W=it.width||0, n=s.length||1;
  let i=0; const re=/\S+/g; let mm;
  while((mm=re.exec(s))){ out.push({text:mm[0], x:x0 + W*(mm.index/n), w:W*(mm[0].length/n), _y:it.transform[5]}); }
  return out;
}
async function pdfToPages(file){
  const pdfjs=await loadPdfjs();
  let pdf, pw="";
  for(let attempt=0; attempt<4; attempt++){
    try{ const data=new Uint8Array(await file.arrayBuffer()); pdf=await pdfjs.getDocument({data, password:pw}).promise; break; }
    catch(e){ if(e && e.name==="PasswordException" && attempt<3){ pw=prompt(`"${file.name}" is password-protected. Enter its password:`)||""; }
      else throw e; }
  }
  const pages=[];
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p); const vp=page.getViewport({scale:1});
    const tc=await page.getTextContent();
    const words=[];
    tc.items.forEach(it=>{ if(!it.str||!it.str.trim()) return;
      explodeItem(it).forEach(t=>words.push({text:t.text, x:t.x, y:vp.height - t._y, w:t.w})); });
    pages.push({width:vp.width, height:vp.height, words});
  }
  return pages;
}

let parsing=false;
async function handleStatements(fileList){
  const files=[...fileList]; if(!files.length) return;
  parsing=true; render();
  const mk=currentMonthKey();
  const bucket=state.spending[mk] || {transactions:[], sources:[], total:0};
  let added=0, failed=[];
  for(const file of files){
    try{
      const pages=await pdfToPages(file);
      const res=WaterfallParser.parseStatement(pages,{master:state.merchantMaster});
      if(!res.bank || !res.transactions.length){ failed.push(file.name+" (unrecognised)"); continue; }
      res.transactions.forEach(t=>t.bank=res.bank);
      bucket.transactions.push(...res.transactions);
      bucket.sources.push({bank:res.bank, file:file.name, count:res.count, spend:res.spend});
      added+=res.count;
    }catch(e){ failed.push(file.name+" ("+(e&&e.message||"error")+")"); }
  }
  bucket.total=bucket.transactions.filter(t=>t.type==="debit").reduce((a,t)=>a+t.amount,0);
  state.spending[mk]=bucket;
  parsing=false; persist(); render();
  toast(added?`Added ${added} transactions`:"Nothing parsed");
  if(failed.length) setTimeout(()=>alert("Could not parse:\n• "+failed.join("\n• ")),300);
}

function spendingTrends(){
  const months=Object.keys(state.spending||{}).filter(k=>state.spending[k].transactions&&state.spending[k].transactions.length).sort();

  const recent=months.slice(-6);
  const max=Math.max(1,...recent.map(k=>state.spending[k].total||0));
  const bars=recent.map(k=>{
    const tot=state.spending[k].total||0; const h=Math.round(tot/max*80);
    const lbl=k.slice(5)+"/"+k.slice(2,4);
    return `<div class="trendbar"><div class="tb" style="height:${h}px" title="${inr(tot)}"></div><div class="tl">${lbl}</div></div>`;
  }).join("");
  return `<section class="card"><h2>Spending trend <span class="hint">— total card spend by month</span></h2>
    <div class="trendwrap">${bars}</div></section>`;
}

function viewGoals(){

   ============================================================ */
function viewCar(){
  const c=state.car; const price=Number(c.price)||0; const tax=(Number(c.marginalTaxPct)||0)/100;
  const cash={ upfront:price, monthly:0, liquidityHit:price, total:price };
  const down=price*(Number(c.downPct)||0)/100; const principal=price-down;
  const r=(Number(c.loanRatePct)||0)/100/12, n=(Number(c.loanYears)||1)*12;
  const emi = r>0 ? principal*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1) : principal/n;
  const loanTotal = down + emi*n;
  const loan={ upfront:down, monthly:emi, liquidityHit:down, total:loanTotal };
  const leaseM=Number(c.leaseMonthly)||0, perq=Number(c.perqMonthly)||0;
  const effLeaseMonthly = leaseM*(1-tax) + perq*tax;
  const leaseYears=(Number(c.loanYears)||1); const leaseTotal=effLeaseMonthly*leaseYears*12;
  const lease={ upfront:0, monthly:effLeaseMonthly, liquidityHit:0, total:leaseTotal };
  const rows=[
    {key:"Pay cash", o:cash, note:"You own it outright. But it drains liquidity for other goals."},
    {key:"Car loan", o:loan, note:"Keeps most cash free. Cheapest to exit — no job lock-in."},
    {key:"Company lease", o:lease, note:"Tax-efficient & no upfront cash, but tied to your job. Leaving early can force a costly buyout."}
  ];
  const winnerRow = rows.reduce((best,x)=>{
    if(x.o.liquidityHit < best.o.liquidityHit) return x;
    if(x.o.liquidityHit === best.o.liquidityHit && x.o.total < best.o.total) return x;
    return best;
  });
  const winner=winnerRow.key;
  const body=rows.map(row=>{
    const win=row.key===winner;
    return `<tr class="${win?'win':''}">
      <td>${row.key} ${win?'<span class="winbadge">↳ best for liquidity</span>':''}</td>
      <td class="num">${inr(row.o.upfront)}</td>
      <td class="num">${row.o.monthly?inr(row.o.monthly):'—'}</td>
      <td class="num">${row.o.liquidityHit?inr(row.o.liquidityHit):'₹0'}</td></tr>`;
  }).join("");
  return `
    <section class="card"><h2>Big buy — lease vs loan vs cash</h2>
      <p class="note" style="margin-top:-4px;margin-bottom:14px">Comparing a <b class="mono">${inr(price)}</b> car three ways. Edit any input below.</p>
      <table class="cmp"><thead><tr><th>Option</th><th>Upfront</th><th>Monthly</th><th>Cash locked</th></tr></thead>
        <tbody>${body}</tbody></table>
      <p class="note" style="margin-top:12px">${rows.map(r=>`<b>${r.key}:</b> ${r.note}`).join("<br>")}</p></section>
    <section class="card"><h2>Inputs</h2>
      <div class="editrow"><span class="k" style="flex:1">Car price</span><input type="number" data-car="price" value="${price}"></div>
      <div class="editrow"><span class="k" style="flex:1">Your marginal tax %</span><input type="number" data-car="marginalTaxPct" value="${c.marginalTaxPct}"></div>
      <div class="grouplbl">Loan</div>
      <div class="editrow"><span class="k" style="flex:1">Down payment %</span><input type="number" data-car="downPct" value="${c.downPct}"></div>
      <div class="editrow"><span class="k" style="flex:1">Interest rate % p.a.</span><input type="number" step="0.1" data-car="loanRatePct" value="${c.loanRatePct}"></div>
      <div class="editrow"><span class="k" style="flex:1">Tenure (years)</span><input type="number" data-car="loanYears" value="${c.loanYears}"></div>
      <div class="grouplbl">Company lease</div>
      <div class="editrow"><span class="k" style="flex:1">Lease rental / month</span><input type="number" data-car="leaseMonthly" value="${c.leaseMonthly}"></div>
      <div class="editrow"><span class="k" style="flex:1">Taxable perquisite / month</span><input type="number" data-car="perqMonthly" value="${c.perqMonthly}"></div>
      <p class="note" style="margin-top:10px"><b>Not tax advice.</b> Check the foreclosure terms if you leave the job — that's the real risk.</p></section>`;
}

function wireApp(){
  const root=document.getElementById("app");
  root.querySelectorAll('#tabs button').forEach(b=>b.onclick=()=>{ activeTab=b.dataset.tab; render(); });
  root.querySelectorAll('[data-go]').forEach(b=>b.onclick=(e)=>{ e.preventDefault(); activeTab=b.dataset.go; render(); });

  // ritual ticks
  root.querySelectorAll('[data-tick]').forEach(b=>b.onclick=()=>{ ritual[b.dataset.tick]=!ritual[b.dataset.tick]; render(); });
  root.querySelectorAll('[data-ritual-earner]').forEach(inp=>inp.onchange=()=>{
    const i=Number(inp.dataset.ritualEarner); state.people[i].amount=Number(inp.value)||0; persist(); render(); });

  // card bill
  const bn=root.querySelector('#billn');
  if(bn){ bn.onchange=()=>{ state.thisMonthBill=Math.max(0,Number(bn.value)||0); alloc=null; persist(); render(); }; }

  // allocation
  root.querySelectorAll('[data-alloc-dest]').forEach(sel=>sel.onchange=()=>{ alloc[Number(sel.dataset.allocDest)].dest=sel.value; render(); });
  root.querySelectorAll('[data-alloc-amt]').forEach(inp=>inp.onchange=()=>{ alloc[Number(inp.dataset.allocAmt)].amount=Number(inp.value)||0; render(); });
  root.querySelectorAll('[data-alloc-del]').forEach(b=>b.onclick=()=>{ alloc.splice(Number(b.dataset.allocDel),1); if(!alloc.length){const m=computeMonth(state.thisMonthBill); alloc=[{dest:"buffer",amount:Math.round(Math.max(0,m.surplus))}];} render(); });
  const aa=root.querySelector('#allocAdd'); if(aa) aa.onclick=()=>{ alloc.push({dest:"buffer",amount:0}); render(); };

  // lock in / reopen
  const lb=root.querySelector('#lockBtn'); if(lb) lb.onclick=lockInMonth;
  const rb=root.querySelector('#reopenBtn'); if(rb) rb.onclick=()=>{
    if(confirm("Re-open "+currentMonthLabel()+"? This removes this month's record so you can redo it.")){
      const k=currentMonthKey(); state.history=state.history.filter(h=>h.key!==k); persist(); render();
    }
  };

  // spending: upload
  const dz=root.querySelector('#dropzone'), sf=root.querySelector('#stmtFile');
  if(sf){
    if(dz) dz.onclick=()=>sf.click();
    sf.onchange=()=>{ if(sf.files&&sf.files.length) handleStatements(sf.files); };
    if(dz){ dz.ondragover=e=>{e.preventDefault(); dz.style.borderColor='var(--gold)';};
      dz.ondragleave=()=>{dz.style.borderColor='';};
      dz.ondrop=e=>{e.preventDefault(); dz.style.borderColor=''; if(e.dataTransfer.files.length) handleStatements(e.dataTransfer.files);}; }
  }
  const addMore=root.querySelector('#addMore'); if(addMore&&sf) addMore.onclick=()=>sf.click();
  root.querySelectorAll('[data-txncat]').forEach(sel=>sel.onchange=()=>{
    const mk=currentMonthKey(); const debits=state.spending[mk].transactions.filter(t=>t.type==="debit");
    const t=debits[Number(sel.dataset.txncat)]; if(!t) return;
    t.category=sel.value; state.merchantMaster[WaterfallParser.merchantKey(t.merchant)]=sel.value;
    persist(); render(); });
  const uab=root.querySelector('#useAsBill'); if(uab) uab.onclick=()=>{
    const sp=state.spending[currentMonthKey()]; state.thisMonthBill=Math.round(sp.total); alloc=null; persist();
    activeTab='home'; render(); toast("Card spend set from statements"); };
  const cs=root.querySelector('#clearSpend'); if(cs) cs.onclick=()=>{
    if(confirm("Clear this month's uploaded statements?")){ delete state.spending[currentMonthKey()]; persist(); render(); } };

  // car
  root.querySelectorAll('[data-car]').forEach(inp=>inp.onchange=()=>{ state.car[inp.dataset.car]=Number(inp.value)||0; persist(); render(); });

  // settings list editors
  root.querySelectorAll('[data-list]').forEach(inp=>inp.onchange=()=>{
    const {list,i,f}=inp.dataset;
    const val=(f==="amount"||f==="target"||f==="saved")?(Number(inp.value)||0):inp.value;
    state[list][Number(i)][f]=val; persist(); if(inp.tagName==="SELECT") render(); });
  root.querySelectorAll('[data-add]').forEach(btn=>btn.onclick=()=>{
    const key=btn.dataset.add;
    const templ={ people:{name:"New earner",amount:0}, fixed:{name:"New bill",amount:0},
      locked:{name:"New investment",amount:0,kind:"equity"}, assets:{name:"New asset",amount:0,cls:"cash"},
      liabilities:{name:"New liability",amount:0}, goals:{name:"New goal",target:100000,saved:0,date:isoIn(24),bucket:"safe"} }[key];
    state[key].push(structuredClone(templ)); persist(); render(); });
  root.querySelectorAll('[data-del]').forEach(btn=>btn.onclick=()=>{ state[btn.dataset.del].splice(Number(btn.dataset.i),1); persist(); render(); });
  const gp=root.querySelector('#goalsPct'), fp=root.querySelector('#flexPct');
  const clampPct=v=>Math.max(0,Math.min(100,Number(v)||0));
  if(gp) gp.onchange=()=>{ state.surplus.goalsPct=clampPct(gp.value); state.surplus.flexPct=100-state.surplus.goalsPct; persist(); render(); };
  if(fp) fp.onchange=()=>{ state.surplus.flexPct=clampPct(fp.value); state.surplus.goalsPct=100-state.surplus.flexPct; persist(); render(); };

  // data buttons
  const ex=root.querySelector('#exportBtn'); if(ex) ex.onclick=exportData;
  const im=root.querySelector('#importBtn'); const imf=root.querySelector('#importFile');
  if(im&&imf){ im.onclick=()=>imf.click(); imf.onchange=importData; }
  const sa=root.querySelector('#sampleBtn');
  if(sa) sa.onclick=()=>{ if(confirm("Replace everything with the sample couple's data?")){ state=structuredClone(SAMPLE); persist(); render(); toast("Reset to sample"); } };
  const cl=root.querySelector('#clearBtn');
  if(cl) cl.onclick=()=>{ if(confirm("Erase all your data from this browser? This cannot be undone.")){ state=null; persist_clear(); startOnboarding(); toast("Cleared"); } };
}
function persist_clear(){ if(hasStorage){ try{ localStorage.removeItem(STORAGE_KEY); }catch(e){} } else { memState=null; } }

function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download="waterfall-backup.json"; a.click(); URL.revokeObjectURL(url); toast("Backup downloaded");
}
function importData(e){
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const data=JSON.parse(r.result);
      if(!data.people) throw new Error("bad");
      state=data; route="app"; persist(); render(); toast("Backup loaded");
    }catch(err){ alert("That doesn't look like a Waterfall backup file."); } };
  r.readAsText(file);
}

/* boot */
render();
</script>
</body>
</html>
